# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # Puedes ajustar estas configuraciones (maxInstances, concurrency, cpu, memoryMiB)
  # si tu app necesita más recursos. Por ahora, los valores predeterminados (o no especificados)
  # suelen ser suficientes para empezar.
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

